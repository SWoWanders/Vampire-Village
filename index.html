<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vampire Village</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0000">
    <link rel="icon" type="image/png" href="VV.png">
    <link rel="apple-touch-icon" href="VV.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: #1a0000; max-width: 600px;
        }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            color: #ff0000; pointer-events: none; text-shadow: 2px 2px #000;
            display: flex; justify-content: space-between; z-index: 10;
        }
        .meter-container { width: 120px; height: 12px; border: 2px solid #ff0000; background: #000; }
        #blood-fill { height: 100%; width: 0%; background-color: #ff0000; transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div>VILLAGES: <span id="score">0</span>/20</div>
            <div style="text-align: right;">BLOOD <div class="meter-container"><div id="blood-fill"></div></div></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('pwabuilder-sw.js').catch(err => console.log(err));
            });
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bloodFill = document.getElementById('blood-fill');
        const scoreEl = document.getElementById('score');

        // Game State
        let bloodLevel = 0;
        let score = 0;
        const houses = [];
        const player = { x: 300, y: 500, size: 24, speed: 4 };

        // Village Generation
        function initVillage() {
            houses.length = 0;
            for(let i = 0; i < 8; i++) {
                houses.push({
                    x: Math.random() * 500 + 50,
                    y: Math.random() * 700 + 50,
                    w: 60,
                    h: 40,
                    color: '#4a3728'
                });
            }
        }

        function resize() {
            canvas.width = 600;
            canvas.height = window.innerHeight * (600 / window.innerWidth);
        }
        window.addEventListener('resize', resize);
        resize();
        initVillage();

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function update() {
            // Movement
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

            // Simple Collision with Houses
            houses.forEach(house => {
                if (player.x < house.x + house.w &&
                    player.x + player.size > house.x &&
                    player.y < house.y + house.h &&
                    player.y + player.size > house.y) {
                    // Collision logic: Snap player to edge (Simple version)
                    if (keys['ArrowUp'] || keys['w']) player.y += player.speed;
                    if (keys['ArrowDown'] || keys['s']) player.y -= player.speed;
                    if (keys['ArrowLeft'] || keys['a']) player.x += player.speed;
                    if (keys['ArrowRight'] || keys['d']) player.x -= player.speed;
                }
            });

            // Update UI
            bloodFill.style.width = `${bloodLevel}%`;
            scoreEl.textContent = score;

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#0a0505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Houses
            houses.forEach(house => {
                ctx.fillStyle = house.color;
                ctx.fillRect(house.x, house.y, house.w, house.h);
                // Roof
                ctx.fillStyle = '#2a1a1a';
                ctx.beginPath();
                ctx.moveTo(house.x - 5, house.y);
                ctx.lineTo(house.x + house.w + 5, house.y);
                ctx.lineTo(house.x + (house.w/2), house.y - 20);
                ctx.fill();
            });

            // Draw Dracula (Red Square placeholder for sprite)
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }

        update();
    </script>
</body>
</html>
