<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vampire Village</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0000">
    
    <link rel="icon" type="image/png" href="VV.png">
    <link rel="apple-touch-icon" href="VV.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --vampire-red: #ff0000;
            --blood-dark: #1a0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--blood-dark);
            border: 4px solid #330000;
            box-sizing: border-box;
            max-width: 600px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: var(--vampire-red);
            pointer-events: none;
            text-shadow: 2px 2px #000;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            z-index: 10;
        }

        .meter-container {
            width: 120px;
            height: 12px;
            border: 2px solid var(--vampire-red);
            background: #000;
            margin-top: 4px;
        }

        #blood-fill {
            height: 100%;
            width: 0%;
            background-color: var(--vampire-red);
            transition: width 0.2s ease-out;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>VILLAGES<br><span id="score">0</span> / 20</div>
            <div style="text-align: right;">
                BLOOD METER
                <div class="meter-container"><div id="blood-fill"></div></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        // Registering your PWA Builder service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('pwabuilder-sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed:', err));
            });
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bloodFill = document.getElementById('blood-fill');
        const scoreEl = document.getElementById('score');

        function resize() {
            canvas.width = 600; 
            canvas.height = window.innerHeight * (600 / window.innerWidth);
        }

        window.addEventListener('resize', resize);
        resize();

        function update() {
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#1a0000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        update();
    </script>
</body>
</html>
